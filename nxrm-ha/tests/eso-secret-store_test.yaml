suite: test external secrets operator secret store
templates:
  - eso-secret-store.yaml
release:
  name: "test-release"
chart:
  version: "latest"
  appVersion: "latest"
tests:
  - it: should create secret store when externalsecrets.enabled is true and aws.secretmanager.enabled and azure.keyvault.enabled are false
    set:
      externalsecrets:
        enabled: true
        secretstore:
          spec:
            provider:
              aws:
                service: SecretsManager
                region: us-east-1
                auth:
                  jwt:
                    serviceAccountRef:
                      name: nexus-repository-deployment-sa # use same service account name as specified in serviceAccount.name
      nexus:
        extraLabels:
          foo: bar
          baz: bay
    asserts:
      - isKind:
          of: SecretStore
      - equal:
          path: metadata.name
          value: "nxrm-ha-nexus-secret-store"
      - equal:
          path: metadata.namespace
          value: "nexusrepo"
      - equal:
          path: spec.provider
          value:
            aws:
              service: SecretsManager
              region: us-east-1
              auth:
                jwt:
                  serviceAccountRef:
                    name: nexus-repository-deployment-sa

      - equal:
          path: metadata.labels
          value:
            app.kubernetes.io/instance: test-release
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: nxrm-ha
            app.kubernetes.io/version: latest
            helm.sh/chart: nxrm-ha-latest
            foo: bar
            baz: bay

  - it: should create secret store with Azure Key Vault WorkloadIdentity provider
    set:
      externalsecrets:
        enabled: true
        secretstore:
          name: nexus-secret-store
          spec:
            provider:
              azurekv:
                authType: WorkloadIdentity
                vaultUrl: "https://my-keyvault.vault.azure.net/"
                serviceAccountRef:
                  name: nexus-repository-dev-ha-sa
    asserts:
      - isKind:
          of: SecretStore
      - equal:
          path: metadata.name
          value: "nxrm-ha-nexus-secret-store"
      - equal:
          path: metadata.namespace
          value: "nexusrepo"
      - equal:
          path: spec.provider
          value:
            azurekv:
              authType: WorkloadIdentity
              vaultUrl: "https://my-keyvault.vault.azure.net/"
              serviceAccountRef:
                name: nexus-repository-dev-ha-sa

  - it: should not render secret store when externalsecrets.enabled is false
    set:
      externalsecrets:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render secret store when aws.secretmanager.enabled is true
    set:
      externalsecrets:
        enabled: true
      aws:
        secretmanager:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render secret store when azure.keyvault.enabled is true
    set:
      externalsecrets:
        enabled: true
      azure:
        keyvault:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0
