suite: test fluent bit yaml for aws
templates:
  - fluent-bit.yaml
release:
  name: "test-release"
chart:
  version: "latest"
tests:
  - it: should create fluent bit objects
    set:
      aws:
        enabled: true
        fluentbit:
          enabled: true
    asserts:
      - documentIndex: 0
        isKind:
          of: ServiceAccount

      - documentIndex: 0
        equal:
          path: metadata.name
          value: "test-release-nxrm-ha-fluent-bit"

      - documentIndex: 1
        isKind:
          of: ClusterRole

      - documentIndex: 1
        equal:
          path: metadata.name
          value: "test-release-nxrm-ha-fluent-bit-role"

      - documentIndex: 2
        isKind:
          of: ClusterRoleBinding

      - documentIndex: 2
        equal:
          path: metadata.name
          value: "test-release-nxrm-ha-fluent-bit-role-binding"

      - documentIndex: 3
        isKind:
          of: ConfigMap

      - documentIndex: 3
        equal:
          path: metadata.name
          value: "fluent-bit-cluster-info"

      - documentIndex: 4
        isKind:
          of: ConfigMap

      - documentIndex: 4
        equal:
          path: metadata.name
          value: "test-release-nxrm-ha-fluent-bit-config"

      - documentIndex: 4
        isNotNull:
          path: data.[nexus-log.conf]

      - documentIndex: 4
        isNotNull:
          path: data.[nexus-request-log.conf]

      - documentIndex: 4
        isNotNull:
          path: data.[nexus-audit-log.conf]

      - documentIndex: 4
        isNotNull:
          path: data.[nexus-tasks-log.conf]

      - documentIndex: 4
        isNotNull:
          path: data.[nexus-outbound-log.conf]

      - documentIndex: 4
        isNotNull:
          path: data.[nexus-jvm-log.conf]

      - documentIndex: 4
        matchRegex:
          path: data.[fluent-bit.conf]
          pattern: "@INCLUDE nexus-outbound-log.conf"

      - documentIndex: 4
        matchRegex:
          path: data.[fluent-bit.conf]
          pattern: "@INCLUDE nexus-jvm-log.conf"

      - documentIndex: 4
        matchRegex:
          path: data.[nexus-outbound-log.conf]
          pattern: "Tag\\s+nexus.outbound-log"

      - documentIndex: 4
        matchRegex:
          path: data.[nexus-outbound-log.conf]
          pattern: "outbound-log-\\*\\.log"

      - documentIndex: 4
        matchRegex:
          path: data.[nexus-jvm-log.conf]
          pattern: "Tag\\s+nexus.jvm-log"

      - documentIndex: 4
        matchRegex:
          path: data.[nexus-jvm-log.conf]
          pattern: "jvm-log-\\*\\.log"

      - documentIndex: 5
        isKind:
          of: DaemonSet

      - documentIndex: 5
        equal:
          path: metadata.name
          value: "test-release-nxrm-ha-fluent-bit"